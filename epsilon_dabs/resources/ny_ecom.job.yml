resources:
  jobs:
    naval_workflow:
      name: naval_workflow
      tasks:
        - task_key: ingestion
          notebook_task:
            notebook_path: /Workspace/Users/tlyemul@gmail.com/epsilon_april_26/day4
              medallion architecture_jobs/ingestion
            base_parameters:
              catalog: dev
              schema: naval_bronze
              table_name: sales
            source: WORKSPACE
          min_retry_interval_millis: 900000
          disable_auto_optimization: true
          environment_key: ingestion_environment
        - task_key: silver
          depends_on:
            - task_key: ingestion
          notebook_task:
            notebook_path: /Workspace/Users/tlyemul@gmail.com/epsilon_april_26/day4
              medallion architecture_jobs/Silver
            source: WORKSPACE
          min_retry_interval_millis: 900000
          disable_auto_optimization: true
        - task_key: gold
          depends_on:
            - task_key: silver
          notebook_task:
            notebook_path: /Workspace/Users/tlyemul@gmail.com/epsilon_april_26/day4
              medallion architecture_jobs/Gold
            source: WORKSPACE
      queue:
        enabled: true
      environments:
        - environment_key: ingestion_environment
          spec:
            environment_version: "5"
      performance_target: PERFORMANCE_OPTIMIZED
